<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Marathon Data Intel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
        .header { background: #161b22; border-bottom: 1px solid #00ff8820; padding: 20px; text-align: center; }
        .header h1 { color: #00ff88; font-size: 1.8rem; }
        .nav { display: flex; justify-content: center; gap: 16px; margin-top: 12px; }
        .nav a { color: #00ff88; text-decoration: none; padding: 6px 12px; border: 1px solid #00ff8840; border-radius: 4px; font-size: 0.85rem; }
        .nav a:hover { background: #00ff8820; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 8px; overflow: hidden; }
        th { background: #21262d; color: #00ff88; padding: 12px 16px; text-align: left; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 12px 16px; border-top: 1px solid #30363d; font-size: 0.9rem; }
        tr:hover td { background: #21262d; }
        .rank-1 { color: #ffd700; font-weight: bold; }
        .rank-2 { color: #c0c0c0; font-weight: bold; }
        .rank-3 { color: #cd7f32; font-weight: bold; }
        .wr-high { color: #00ff88; }
        .wr-mid { color: #ffcc00; }
        .wr-low { color: #ff4444; }
        #loading { text-align: center; padding: 40px; color: #8b949e; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Leaderboard</h1>
        <div class="nav">
            <a href="/">Dashboard</a>
            <a href="/leaderboard">Leaderboard</a>
            <a href="/network">Network</a>
            <a href="/api-tool">API Tool</a>
        </div>
    </div>
    <div class="container">
        <div id="content"><div id="loading">Loading leaderboard...</div></div>
    </div>
    <script>
        async function load() {
            try {
                const res = await fetch('/api/leaderboard?limit=50');
                const data = await res.json();
                const rows = (data.leaderboard || []);
                if (!rows.length) { document.getElementById('content').innerHTML = '<p style="text-align:center;color:#8b949e;padding:40px">No leaderboard data yet</p>'; return; }
                let html = '<table><thead><tr><th>Rank</th><th>Player</th><th>W/L</th><th>Win Rate</th><th>K/D</th><th>Main</th><th>Score</th></tr></thead><tbody>';
                rows.forEach((r, i) => {
                    const rank = i + 1;
                    const cls = rank <= 3 ? `rank-${rank}` : '';
                    const wrCls = r.win_rate >= 60 ? 'wr-high' : r.win_rate >= 45 ? 'wr-mid' : 'wr-low';
                    html += `<tr><td class="${cls}">#${rank}</td><td>${r.display_name}</td><td>${r.wins}/${r.losses}</td><td class="${wrCls}">${r.win_rate}%</td><td>${r.avg_kd}</td><td>${r.main_runner}</td><td>${r.score}</td></tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('content').innerHTML = html;
            } catch { document.getElementById('content').innerHTML = '<p style="text-align:center;color:#8b949e">Failed to load</p>'; }
        }
        load();
    </script>
</body>
</html>
