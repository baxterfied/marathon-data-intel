<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Intel - Marathon Data Intel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', 'Segoe UI', system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; }

        /* Compact header */
        .header { background: #161b22; border-bottom: 1px solid #00ff8830; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .header h1 { font-family: 'Bebas Neue', sans-serif; color: #00ff88; font-size: 1.3rem; letter-spacing: 3px; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .nav { display: flex; gap: 8px; }
        .nav a { font-family: 'Space Mono', monospace; color: #58a6ff; text-decoration: none; font-size: 0.7rem; padding: 4px 8px; border-radius: 3px; }
        .nav a:hover { background: #21262d; }
        .live { display: flex; align-items: center; gap: 5px; font-family: 'Space Mono', monospace; font-size: 0.65rem; color: #8b949e; }
        .pulse { width: 6px; height: 6px; border-radius: 50%; background: #00ff88; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Summary banner */
        .summary { display: flex; gap: 2px; padding: 0 12px; background: #0d1117; border-bottom: 1px solid #21262d; }
        .summary-item { flex: 1; padding: 10px 8px; text-align: center; border-right: 1px solid #21262d; }
        .summary-item:last-child { border-right: none; }
        .summary-item .val { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: #00ff88; line-height: 1; }
        .summary-item .lbl { font-family: 'Space Mono', monospace; font-size: 0.55rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        /* Main content */
        .content { padding: 12px; display: flex; gap: 12px; }

        /* Region list - compact sidebar style */
        .regions { flex: 0 0 320px; display: flex; flex-direction: column; gap: 6px; }
        .region-row { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 10px 14px; display: grid; grid-template-columns: 1fr auto auto auto auto; align-items: center; gap: 12px; transition: border-color 0.15s; }
        .region-row:hover { border-color: #30363d; }
        .region-name { font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        .region-stat { text-align: right; font-size: 0.8rem; font-weight: 600; min-width: 50px; }
        .region-stat-lbl { font-family: 'Space Mono', monospace; font-size: 0.5rem; color: #8b949e; text-transform: uppercase; }
        .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; }
        .dot-good { background: #00ff88; }
        .dot-warn { background: #ffcc00; }
        .dot-bad { background: #ff4444; }

        /* Server table - main area */
        .servers { flex: 1; min-width: 0; }
        .servers h2 { font-family: 'Bebas Neue', sans-serif; color: #8b949e; font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 6px; }
        .table-wrap { overflow-x: auto; border-radius: 6px; border: 1px solid #21262d; }
        table { width: 100%; border-collapse: collapse; background: #161b22; }
        th { font-family: 'Space Mono', monospace; background: #0d1117; color: #8b949e; padding: 6px 12px; text-align: left; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 7px 12px; border-top: 1px solid #21262d; font-size: 0.82rem; font-weight: 500; }
        tr:hover td { background: #1c2128; }

        .good { color: #00ff88; }
        .warn { color: #ffcc00; }
        .bad { color: #ff4444; }

        /* CTA - inline bar */
        .cta { background: #161b22; border-top: 1px solid #21262d; padding: 10px 16px; display: flex; align-items: center; gap: 12px; font-size: 0.8rem; color: #8b949e; }
        .cta code { font-family: 'Space Mono', monospace; background: #21262d; padding: 2px 6px; border-radius: 3px; font-size: 0.75rem; color: #e0e0e0; }
        .cta a { color: #58a6ff; text-decoration: none; }
        .cta a:hover { text-decoration: underline; }

        .empty { text-align: center; color: #8b949e; padding: 24px; font-size: 0.85rem; }
        #loading { text-align: center; padding: 24px; color: #8b949e; }

        /* Mobile */
        @media (max-width: 700px) {
            .header { padding: 10px 12px; }
            .header h1 { font-size: 1.1rem; }
            .content { flex-direction: column; padding: 8px; gap: 8px; }
            .regions { flex: none; }
            .region-row { grid-template-columns: 1fr auto auto auto; gap: 8px; padding: 8px 10px; }
            .region-stat { min-width: 40px; font-size: 0.75rem; }
            .summary-item .val { font-size: 1.2rem; }
            .summary-item .lbl { font-size: 0.5rem; }
            .cta { flex-wrap: wrap; font-size: 0.75rem; }
            th, td { padding: 6px 8px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Network Intel</h1>
        <div class="header-right">
            <div class="live"><span class="pulse"></span> <span id="last-update">Live</span></div>
            <div class="nav">
                <a href="/">Home</a>
                <a href="/me">Dashboard</a>
                <a href="/leaderboard">Leaderboard</a>
                <a href="/capture">Capture</a>
                <a href="/docs">API</a>
            </div>
        </div>
    </div>

    <div id="summary" class="summary">
        <div class="summary-item"><div class="val">-</div><div class="lbl">Regions</div></div>
        <div class="summary-item"><div class="val">-</div><div class="lbl">Samples</div></div>
        <div class="summary-item"><div class="val">-</div><div class="lbl">Ping</div></div>
        <div class="summary-item"><div class="val">-</div><div class="lbl">Jitter</div></div>
        <div class="summary-item"><div class="val">-</div><div class="lbl">Loss</div></div>
    </div>

    <div class="content">
        <div class="regions" id="regions">
            <div id="loading">Loading...</div>
        </div>
        <div class="servers">
            <h2>Server Detail</h2>
            <div class="table-wrap" id="servers"></div>
        </div>
    </div>

    <div class="cta">
        <span>Contribute data:</span>
        <code>pip install scapy && python netcapture.py --user-hash YOUR_NAME</code>
        <a href="/capture">Setup guide</a>
    </div>

    <script>
        function pingClass(ms) { return ms < 50 ? 'good' : ms < 100 ? 'warn' : 'bad'; }
        function dotClass(ms) { return ms < 50 ? 'dot-good' : ms < 100 ? 'dot-warn' : 'dot-bad'; }
        function lossClass(pct) { return pct < 1 ? 'good' : pct < 3 ? 'warn' : 'bad'; }

        async function loadData() {
            try {
                const [regRes, srvRes] = await Promise.all([
                    fetch('/api/network/regions'),
                    fetch('/api/network'),
                ]);
                const regData = await regRes.json();
                const srvData = await srvRes.json();
                const regions = regData.regions || [];
                const servers = srvData.network || [];

                // Summary
                const totalSamples = regions.reduce((s, r) => s + r.samples, 0);
                const avgPing = regions.length ? (regions.reduce((s, r) => s + parseFloat(r.avg_ping), 0) / regions.length).toFixed(1) : '-';
                const avgJitter = regions.length ? (regions.reduce((s, r) => s + parseFloat(r.avg_jitter), 0) / regions.length).toFixed(1) : '-';
                const avgLoss = regions.length ? (regions.reduce((s, r) => s + parseFloat(r.avg_loss), 0) / regions.length).toFixed(2) : '-';

                document.getElementById('summary').innerHTML = `
                    <div class="summary-item"><div class="val">${regions.length}</div><div class="lbl">Regions</div></div>
                    <div class="summary-item"><div class="val">${totalSamples.toLocaleString()}</div><div class="lbl">Samples</div></div>
                    <div class="summary-item"><div class="val ${pingClass(avgPing)}">${avgPing}ms</div><div class="lbl">Ping</div></div>
                    <div class="summary-item"><div class="val">${avgJitter}ms</div><div class="lbl">Jitter</div></div>
                    <div class="summary-item"><div class="val ${lossClass(avgLoss)}">${avgLoss}%</div><div class="lbl">Loss</div></div>
                `;

                // Regions
                if (!regions.length) {
                    document.getElementById('regions').innerHTML = '<div class="empty">No data yet. Run the capture agent to contribute.</div>';
                } else {
                    let rhtml = '';
                    regions.forEach(r => {
                        const pc = pingClass(r.avg_ping);
                        const dc = dotClass(r.avg_ping);
                        const lc = lossClass(r.avg_loss);
                        rhtml += `<div class="region-row">
                            <div class="region-name"><span class="dot ${dc}"></span>${r.region}</div>
                            <div class="region-stat"><div class="${pc}">${r.avg_ping}ms</div><div class="region-stat-lbl">Ping</div></div>
                            <div class="region-stat"><div>${r.avg_jitter}ms</div><div class="region-stat-lbl">Jitter</div></div>
                            <div class="region-stat"><div class="${lc}">${r.avg_loss}%</div><div class="region-stat-lbl">Loss</div></div>
                            <div class="region-stat"><div>${r.samples}</div><div class="region-stat-lbl">n</div></div>
                        </div>`;
                    });
                    document.getElementById('regions').innerHTML = rhtml;
                }

                // Server detail table
                if (servers.length) {
                    let thtml = `<table><thead><tr>
                        <th>Region</th><th>Map</th><th>Ping</th><th>Jitter</th>
                        <th>Loss</th><th>Tick</th><th>n</th>
                    </tr></thead><tbody>`;
                    servers.forEach(s => {
                        const pc = pingClass(s.avg_ping);
                        const lc = lossClass(s.avg_loss);
                        thtml += `<tr>
                            <td>${s.region}</td><td>${s.map_name}</td>
                            <td class="${pc}">${s.avg_ping}ms</td>
                            <td>${s.avg_jitter}ms</td>
                            <td class="${lc}">${s.avg_loss}%</td>
                            <td>${s.avg_tick_rate || '-'}</td>
                            <td>${s.samples}</td>
                        </tr>`;
                    });
                    thtml += '</tbody></table>';
                    document.getElementById('servers').innerHTML = thtml;
                } else {
                    document.getElementById('servers').innerHTML = '<div class="empty">No per-server data yet</div>';
                }

                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();

            } catch (e) {
                document.getElementById('regions').innerHTML = '<div class="empty">Failed to load</div>';
            }
        }

        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
